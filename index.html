    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }

        // Consent mode default (GDPR-compliant - all denied until user consent)
        gtag('consent', 'default', {
            'ad_storage': 'denied',
            'ad_user_data': 'denied',
            'ad_personalization': 'denied',
            'analytics_storage': 'denied',
            'functionality_storage': 'granted',
            'personalization_storage': 'denied',
            'security_storage': 'granted',
            'wait_for_update': 500
        });

        // Apply saved consent preferences if available
        (function () {
            try {
                const saved = localStorage.getItem('consent_preferences');
                if (saved) {
                    const preferences = JSON.parse(saved);
                    const { timestamp, ...settings } = preferences;

                    // Check if preferences are still valid (7 days)
                    const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;
                    if (timestamp && Date.now() - timestamp <= sevenDaysMs) {
                        gtag('consent', 'update', settings);
                    }
                }
            } catch (e) {
                // Silent fail - will use default consent
            }
        })();
    </script>

    <style>
        /* --- KOLI ONE GLASS SPHERE LOADER --- */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(8px);
            z-index: 99999;
            font-family: 'Exo 2', sans-serif;
            transition: opacity 0.5s ease;
        }

        .sphere-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-sphere {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%,
                    rgba(255, 255, 255, 0.25) 0%,
                    rgba(255, 143, 16, 0.15) 25%,
                    rgba(255, 143, 16, 0.08) 50%,
                    rgba(0, 0, 0, 0.3) 100%);
            box-shadow:
                0 0 25px rgba(255, 143, 16, 0.4),
                inset 0 -10px 20px rgba(0, 0, 0, 0.4),
                inset 0 10px 20px rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .led-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    transparent 0deg,
                    #FF8F10 30deg,
                    #FFB366 60deg,
                    #FF8F10 90deg,
                    transparent 100deg,
                    transparent 360deg);
            mask-image: radial-gradient(circle,
                    transparent 56px,
                    black 56px,
                    black 59px,
                    transparent 59px);
            -webkit-mask-image: radial-gradient(circle,
                    transparent 56px,
                    black 56px,
                    black 59px,
                    transparent 59px);
            filter: drop-shadow(0 0 8px rgba(255, 143, 16, 0.8));
            animation: led-orbit 1.2s linear infinite, led-pulse 2s ease-in-out infinite;
            z-index: 2;
        }

        .sphere-logo {
            position: relative;
            width: 48px;
            height: 48px;
            object-fit: contain;
            z-index: 3;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .brand-text {
            margin-top: 32px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 143, 16, 0.6);
        }

        @keyframes led-orbit {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes led-pulse {

            0%,
            100% {
                filter: drop-shadow(0 0 8px rgba(255, 143, 16, 0.8));
            }

            50% {
                filter: drop-shadow(0 0 16px rgba(255, 143, 16, 1));
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .led-ring {
                animation: led-pulse 2s ease-in-out infinite;
            }

            @keyframes led-orbit {
                from {
                    transform: rotate(0deg);
                }

                to {
                    transform: rotate(0deg);
                }
            }
        }
    </style>

    <!-- Hide loader when React mounts -->
    <script>
        window.addEventListener('DOMContentLoaded', function () {
            var rootEl = document.getElementById('root');
            var loaderEl = document.getElementById('loader-container');

            if (rootEl && loaderEl) {
                var observer = new MutationObserver(function (mutations) {
                    if (rootEl.children.length > 0) {
                        loaderEl.style.opacity = '0';
                        setTimeout(function () {
                            loaderEl.style.display = 'none';
                        }, 500);
                        observer.disconnect();
                    }
                });

                observer.observe(rootEl, { childList: true, subtree: false });
            }
        });
    </script>
