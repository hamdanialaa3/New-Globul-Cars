        /* --- ULTIMATE GEAR LOGO LOADER --- */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(8px);
            z-index: 99999;
            font-family: 'Exo 2', sans-serif;
            transition: opacity 0.5s ease;
        }

        .loader-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #canvas-container canvas {
            color: rgba(26, 29, 46, 0.25);
            text-align: center;
            vertical-align: middle;
            line-height: 0;
            width: 100%;
            height: 100%;
            background-color: unset;
            background: unset;
            background-image: none;
            box-shadow: none;
            filter: none;
        }

        .text-container {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 2;
        }

        .brand-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 204, 255, 0.6);
            margin-bottom: 5px;
        }

        .status-text {
            font-size: 0.8rem;
            color: #00ccff;
            letter-spacing: 3px;
            opacity: 0.8;
            animation: pulseStatus 1.5s infinite;
        }

        @keyframes pulseStatus {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
