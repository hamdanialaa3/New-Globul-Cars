<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معالج الصور البسيط</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        #imageInput {
            display: none;
        }
        
        .results {
            display: none;
            margin-top: 30px;
        }
        
        .image-container {
            display: inline-block;
            margin: 20px;
            text-align: center;
        }
        
        .image-container img, .image-container canvas {
            max-width: 300px;
            max-height: 300px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .image-title {
            margin-top: 15px;
            font-weight: 600;
            color: #333;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
        }
        
        .processing {
            display: none;
            color: #667eea;
            font-size: 1.2rem;
            margin: 20px 0;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ معالج الصور البسيط</h1>
        <p>إزالة الخلفية وتحسين الوضوح بنقرة واحدة</p>
        
        <div class="upload-area" onclick="document.getElementById('imageInput').click()">
            <h3>📁 اختر صورة أو اسحبها هنا</h3>
            <p>يدعم: JPG, PNG, WEBP</p>
        </div>
        
        <input type="file" id="imageInput" accept="image/*">
        
        <div class="processing">
            <div class="spinner"></div>
            جاري المعالجة...
        </div>
        
        <div class="results" id="results">
            <div class="image-container">
                <img id="originalImage" alt="الصورة الأصلية">
                <div class="image-title">الصورة الأصلية</div>
            </div>
            
            <div class="image-container">
                <canvas id="processedCanvas"></canvas>
                <div class="image-title">بدون خلفية + وضوح محسن</div>
                <button class="download-btn" onclick="downloadProcessedImage()">
                    تحميل الصورة المعالجة
                </button>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const uploadArea = document.querySelector('.upload-area');
        const results = document.getElementById('results');
        const processing = document.querySelector('.processing');
        const originalImage = document.getElementById('originalImage');
        const processedCanvas = document.getElementById('processedCanvas');

        // رفع الصورة
        imageInput.addEventListener('change', handleImageUpload);
        
        // السحب والإفلات
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                processImage(files[0]);
            }
        });

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                processImage(file);
            }
        }

        function processImage(file) {
            processing.style.display = 'block';
            results.style.display = 'none';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    originalImage.src = e.target.result;
                    
                    // معالجة الصورة
                    setTimeout(() => {
                        enhanceAndRemoveBackground(img);
                        processing.style.display = 'none';
                        results.style.display = 'block';
                    }, 500);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function enhanceAndRemoveBackground(img) {
            const canvas = processedCanvas;
            const ctx = canvas.getContext('2d');
            
            // تحديد حجم الكانفاس (تحسين الدقة)
            const scale = 2; // مضاعفة الدقة
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            
            // تحسين الرسم
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            
            // رسم الصورة
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            // الحصول على بيانات الصورة
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // معالجة كل بكسل
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // تحسين الوضوح والتباين
                data[i] = Math.min(255, (r - 128) * 1.3 + 128 * 1.1);     // Red
                data[i + 1] = Math.min(255, (g - 128) * 1.3 + 128 * 1.1); // Green
                data[i + 2] = Math.min(255, (b - 128) * 1.3 + 128 * 1.1); // Blue
                
                // إزالة الخلفية البيضاء والرمادية
                if (r > 240 && g > 240 && b > 240) {
                    data[i + 3] = 0; // شفاف تماماً
                } else if (r > 200 && g > 200 && b > 200 && 
                          Math.abs(r - g) < 15 && Math.abs(g - b) < 15) {
                    data[i + 3] = Math.max(0, data[i + 3] * 0.3); // شفاف جزئياً
                }
            }
            
            // تطبيق التغييرات
            ctx.putImageData(imageData, 0, 0);
            
            // تحديد حجم العرض
            canvas.style.width = Math.min(300, img.width) + 'px';
            canvas.style.height = 'auto';
        }

        function downloadProcessedImage() {
            const link = document.createElement('a');
            link.download = 'processed-image.png';
            link.href = processedCanvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
