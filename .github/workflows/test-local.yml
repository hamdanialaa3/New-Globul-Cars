name: Mobile App — Unit & Local Tests

on:
  push:
    branches:
      - main
      - feat/mobile/**
    paths:
      - 'mobile_new/**'
      - '.github/workflows/test-local.yml'
      - '!**/*.md'
  pull_request:
    branches:
      - main
      - feat/mobile/**
    paths:
      - 'mobile_new/**'
      - '.github/workflows/test-local.yml'
      - '!**/*.md'

concurrency:
  group: local-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: |
          cd mobile_new
          npm ci --legacy-peer-deps

      - name: Run tests
        run: |
          cd mobile_new
          npx jest --coverage --bail=false --json --outputFile=coverage.json
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./mobile_new/coverage.json
          flags: mobile-jest
          fail_ci_if_error: false

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('mobile_new/coverage.json')) {
              const coverage = JSON.parse(fs.readFileSync('mobile_new/coverage.json', 'utf8'));
              const comment = `## 📊 Test Coverage\n\n\`\`\`\nLine: ${coverage.total.lines.pct}%\nBranch: ${coverage.total.branches.pct}%\nFunctions: ${coverage.total.functions.pct}%\nStatements: ${coverage.total.statements.pct}%\n\`\`\``;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: |
          cd mobile_new
          npm ci --legacy-peer-deps
          npx tsc --noEmit 2>&1 | tee tsc-output.log

      - name: Upload TypeScript results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-results
          path: mobile_new/tsc-output.log

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: |
          cd mobile_new
          npm ci --legacy-peer-deps
          npx eslint src --format=json > eslint-results.json || true

      - name: Upload ESLint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-results
          path: mobile_new/eslint-results.json

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: |
          cd mobile_new
          npm ci --legacy-peer-deps
          npx expo config --json > /dev/null && echo "✓ Expo config valid"

      - name: Validate configuration
        run: |
          cd mobile_new
          npx tsc --noEmit
          echo "✓ TypeScript valid"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, type-check, lint, build-check]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.type-check.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.build-check.result }}" = "failure" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All checks passed"
