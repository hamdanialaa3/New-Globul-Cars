name: Mobile App — Firebase Test Lab

on:
  push:
    branches:
      - main
      - feat/mobile/**
    paths:
      - 'mobile_new/**'
      - '.github/workflows/test-firebase.yml'
      - '!**/*.md'
  pull_request:
    branches:
      - main
      - feat/mobile/**
    paths:
      - 'mobile_new/**'
      - '.github/workflows/test-firebase.yml'
      - '!**/*.md'

concurrency:
  group: firebase-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build APK & Run Firebase Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Google Cloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install mobile dependencies
        run: |
          cd mobile_new
          npm ci --legacy-peer-deps

      - name: Validate configuration
        run: |
          cd mobile_new
          npx expo config --json > /dev/null

      - name: Build test APK
        run: |
          cd mobile_new
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --output dist/koli-one-test.apk

      - name: Run Firebase Test Lab
        id: firebase-test
        run: |
          cd mobile_new
          set +e
          gcloud firebase test android run \
            --app=dist/koli-one-test.apk \
            --test-type robo \
            --timeout=600s \
            --results-bucket=gs://firebase-test-lab-${{ secrets.GCP_PROJECT_ID }}/results \
            --results-dir=${{ github.run_id }}-${{ github.run_number }} \
            --os-api-levels=35 \
            --locales=en,ar \
            --orientations=portrait \
            2>&1 | tee firebase-test.log
          rc=${PIPESTATUS[0]}
          set -e

          if [ $rc -eq 0 ]; then
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit $rc
          fi

      - name: Download test results
        if: always()
        run: |
          mkdir -p test-results
          gsutil -m cp -r \
            gs://firebase-test-lab-${{ secrets.GCP_PROJECT_ID }}/results/${{ github.run_id }}-${{ github.run_number }}/* \
            test-results/ || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-results
          path: |
            test-results/
            mobile_new/firebase-test.log
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = '${{ steps.firebase-test.outputs.status }}' === 'passed' ? '✅' : '⚠️';
            const comment = `## ${status} Firebase Test Lab Results\n\n${fs.readFileSync('mobile_new/firebase-test.log', 'utf8')}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if tests failed
        if: steps.firebase-test.outcome == 'failure'
        run: exit 1

  local-tests:
    name: Local Tests (Jest + TypeScript)
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd mobile_new
          npm ci --legacy-peer-deps

      - name: Run Jest tests
        id: jest
        run: |
          cd mobile_new
          npx jest --coverage --bail=false
        continue-on-error: true

      - name: Type check
        id: tsc
        run: |
          cd mobile_new
          npx tsc --noEmit
        continue-on-error: true

      - name: Fail if local checks failed
        if: steps.jest.outcome == 'failure' || steps.tsc.outcome == 'failure'
        run: exit 1

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./mobile_new/coverage/coverage-final.json
          flags: mobile
          fail_ci_if_error: false

  status-check:
    name: Status Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, local-tests]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.build-and-test.result }}" = "failure" ] || [ "${{ needs.local-tests.result }}" = "failure" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
