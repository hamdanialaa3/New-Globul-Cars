name: functions-ci

on:
  push:
    paths:
      - "functions/**"
      - ".github/workflows/functions-ci.yml"
  pull_request:
    paths:
      - "functions/**"
      - ".github/workflows/functions-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install deps
        run: |
          npm ci --no-audit --no-fund

      - name: TypeScript build (must pass)
        run: |
          npm run build
