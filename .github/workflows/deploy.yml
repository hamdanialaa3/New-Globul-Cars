# Firebase Hosting Deployment - CI/CD
# الموقع: بلغاريا | اللغات: BG/EN | العملة: EUR

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      
      - name: Verify TypeScript Version
        run: |
          echo "Checking TypeScript version compatibility..."
          EXPECTED_TS_VERSION="^4.9.5"
          ACTUAL_TS_VERSION=$(node -p "require('./package.json').dependencies.typescript")
          echo "Expected: $EXPECTED_TS_VERSION"
          echo "Actual: $ACTUAL_TS_VERSION"
          if [[ "$ACTUAL_TS_VERSION" != "$EXPECTED_TS_VERSION" ]]; then
            echo "::warning::TypeScript version mismatch. Expected $EXPECTED_TS_VERSION but found $ACTUAL_TS_VERSION"
          fi
      
      - name: Install dependencies
        run: |
          npm ci
          cd functions
          npm ci
          cd ..
      
      - name: Security Audit
        run: |
          echo "Running security audit..."
          npm audit --audit-level=moderate || echo "::warning::Security vulnerabilities found. Please review."
      
      - name: Type Check
        run: |
          echo "Running TypeScript type checking..."
          npm run type-check
      
      - name: Build
        run: |
          npm run build
        env:
          CI: false
      
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: fire-new-globul
          entryPoint: .
