name: frontend-ci

on:
  push:
    paths:
      - "bulgarian-car-marketplace/**"
      - "docker-compose.yml"
      - "bulgarian-car-marketplace/Dockerfile"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "bulgarian-car-marketplace/**"
      - "docker-compose.yml"
      - "bulgarian-car-marketplace/Dockerfile"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    defaults:
      run:
        working-directory: bulgarian-car-marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bulgarian-car-marketplace/package-lock.json

      - name: Install (legacy peers) and build
        run: |
          npm ci --no-audit --no-fund --legacy-peer-deps
          npm run build

      - name: Tests (must pass)
        run: |
          npm test -- --watchAll=false --passWithNoTests

      - name: Strict install check (React 19 peer readiness)
        run: |
          npm run ci:strict
        continue-on-error: true