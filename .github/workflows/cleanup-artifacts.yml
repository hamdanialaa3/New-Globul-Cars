name: Cleanup Old Artifacts

on:
  # Run daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete Old Artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write
    
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const daysToKeep = 3;
            const now = Date.now();
            const cutoff = now - (daysToKeep * 24 * 60 * 60 * 1000);
            
            console.log(`🗑️  Deleting artifacts older than ${daysToKeep} days...`);
            
            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            let deletedCount = 0;
            let totalSize = 0;
            
            for (const artifact of artifacts.artifacts) {
              const createdAt = new Date(artifact.created_at).getTime();
              
              if (createdAt < cutoff) {
                console.log(`Deleting: ${artifact.name} (${artifact.size_in_bytes} bytes, created ${artifact.created_at})`);
                
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                
                deletedCount++;
                totalSize += artifact.size_in_bytes;
              }
            }
            
            const totalSizeMB = (totalSize / (1024 * 1024)).toFixed(2);
            console.log(`✅ Deleted ${deletedCount} artifacts, freed ${totalSizeMB} MB`);
