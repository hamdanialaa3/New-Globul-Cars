name: Cleanup Artifacts (Keep Latest 3)

on:
  # Run daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete artifacts but keep latest 3
    runs-on: ubuntu-latest
    permissions:
      actions: write
    
    steps:
      - name: Cleanup artifacts (keep latest 3)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const KEEP = 3; // keep latest N artifacts

            console.log(`🧹 Cleaning artifacts for ${owner}/${repo} (keep latest ${KEEP})...`);

            // Fetch all artifacts with pagination
            const allArtifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            if (!allArtifacts || allArtifacts.length === 0) {
              console.log('✅ No artifacts found. Nothing to delete.');
              return;
            }

            // Sort by created_at DESC (newest first)
            const sorted = allArtifacts
              .filter(a => !a.expired)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toKeep = sorted.slice(0, KEEP);
            const toDelete = sorted.slice(KEEP);

            console.log(`📦 Total: ${sorted.length} | Keep: ${toKeep.length} | Delete: ${toDelete.length}`);

            // Log what we keep
            for (const a of toKeep) {
              const sizeMB = (a.size_in_bytes / (1024 * 1024)).toFixed(2);
              console.log(`  🔒 Keep: ${a.name} | ${sizeMB} MB | ${a.created_at}`);
            }

            let deletedCount = 0;
            let totalFreed = 0;

            for (const a of toDelete) {
              try {
                await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
                deletedCount++;
                totalFreed += a.size_in_bytes;
                const sizeMB = (a.size_in_bytes / (1024 * 1024)).toFixed(2);
                console.log(`  ✅ Deleted: ${a.name} | ${sizeMB} MB | ${a.created_at}`);
              } catch (e) {
                console.log(`  ❌ Failed to delete ${a.name}: ${e.message}`);
              }
            }

            const freedMB = (totalFreed / (1024 * 1024)).toFixed(2);
            console.log(`\n✅ Done. Deleted ${deletedCount} artifacts. Freed ${freedMB} MB.`);
