# ⚠️ Docker CI workflow - Optional
# This workflow builds and pushes to Docker Hub
# It's separate from Firebase deployment
# Disabled for now to avoid confusion with main deployment workflow

name: ci (Docker - Optional)

# Workflow disabled - runs only on manual trigger
# To re-enable automatic builds, replace workflow_dispatch with push trigger
on:
  workflow_dispatch:

# on:
#   push:
#     branches:
#       - "main"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "hamdanialaa3/mobilebg"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          tags: "${{ secrets.DOCKER_USER }}/docker-build-cloud-demo:latest"
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
