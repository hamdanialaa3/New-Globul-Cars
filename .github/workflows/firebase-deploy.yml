name: Deploy to Firebase (Hosting + Functions)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install app dependencies
        run: npm ci

      - name: Build app (CRA)
        env:
          NODE_ENV: production
          CI: false
        run: npm run build

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Configure Service Account
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write service account JSON to file
          if [ -z "$SERVICE_ACCOUNT_JSON" ]; then
            echo "❌ FIREBASE_SERVICE_ACCOUNT secret is not set or is empty"
            echo "Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          echo "$SERVICE_ACCOUNT_JSON" > "${HOME}/gcloud.json"

          # Verify the file was created
          if [ ! -f "${HOME}/gcloud.json" ]; then
            echo "❌ Failed to create service account file"
            exit 1
          fi

          # Check file size
          FILE_SIZE=$(stat -f%z "${HOME}/gcloud.json" 2>/dev/null || stat -c%s "${HOME}/gcloud.json" 2>/dev/null)
          echo "📄 Service account file size: ${FILE_SIZE} bytes"

          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "❌ Service account file is too small"
            exit 1
          fi

          # Validate JSON and extract email
          if command -v jq >/dev/null 2>&1; then
            if ! jq empty "${HOME}/gcloud.json" 2>/dev/null; then
              echo "❌ Invalid JSON format"
              exit 1
            fi
            SERVICE_EMAIL=$(jq -r '.client_email // empty' "${HOME}/gcloud.json")
          else
            SERVICE_EMAIL=$(grep -o '"client_email"[[:space:]]*:[[:space:]]*"[^"]*"' "${HOME}/gcloud.json" | sed 's/.*"\([^"]*\)".*/\1/')
          fi

          if [ -z "$SERVICE_EMAIL" ]; then
            echo "❌ Missing 'client_email' in service account JSON"
            exit 1
          fi

          # Set environment variable for subsequent steps
          echo "GOOGLE_APPLICATION_CREDENTIALS=${HOME}/gcloud.json" >> $GITHUB_ENV
          echo "✅ Service account: ${SERVICE_EMAIL}"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          export_default_credentials: true

      - name: Validate Firebase project id
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "❌ FIREBASE_PROJECT_ID secret is not set or is empty"
            echo "Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✅ Firebase project id set: $PROJECT_ID"

      - name: Auth sanity check
        run: |
          gcloud auth list --filter=status:ACTIVE || true
          gcloud config list project || true
          firebase --version
          firebase projects:list --non-interactive || true

      - name: Set Stripe runtime config (functions)
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          if [ -n "$STRIPE_SECRET_KEY" ] && [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            firebase functions:config:set stripe.secret="$STRIPE_SECRET_KEY" stripe.webhook="$STRIPE_WEBHOOK_SECRET" --project "$PROJECT_ID"
          else
            echo "Stripe secrets not provided; skipping functions:config:set"
          fi

      - name: Deploy Hosting
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase deploy --only hosting --project "$PROJECT_ID" --non-interactive

      - name: Deploy Functions
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase deploy --only functions --project "$PROJECT_ID" --non-interactive
