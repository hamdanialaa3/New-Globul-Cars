name: Deploy to Firebase (Hosting + Functions)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install app dependencies
        run: npm ci

      - name: Build app (CRA)
        env:
          NODE_ENV: production
          CI: false
        run: npm run build

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Configure Service Account
        run: |
          # Check if secret is set
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ]; then
            echo "❌ FIREBASE_SERVICE_ACCOUNT secret is not set or is empty"
            echo "Please add it in: Settings → Secrets and variables → Actions"
            exit 1
          fi
          
          # Write service account JSON to file (use printf to avoid newline issues)
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "${HOME}/gcloud.json"

          # Verify the file was created and contains data
          if [ ! -f "${HOME}/gcloud.json" ]; then
            echo "❌ Failed to create service account file"
            exit 1
          fi
          
          FILE_SIZE=$(wc -c < "${HOME}/gcloud.json")
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "❌ Service account file is too small ($FILE_SIZE bytes)"
            echo "File contents:"
            cat "${HOME}/gcloud.json"
            exit 1
          fi

          # Validate JSON format
          if ! jq empty "${HOME}/gcloud.json" 2>/dev/null; then
            echo "❌ Service account file is not valid JSON"
            echo "First 200 characters:"
            head -c 200 "${HOME}/gcloud.json"
            exit 1
          fi

          # Extract client_email
          SERVICE_EMAIL=$(jq -r '.client_email // empty' "${HOME}/gcloud.json")
          
          if [ -z "$SERVICE_EMAIL" ]; then
            echo "❌ Service account JSON is missing 'client_email' field"
            echo "JSON keys found:"
            jq -r 'keys | join(", ")' "${HOME}/gcloud.json"
            exit 1
          fi

          # Set environment variable for Firebase CLI
          echo "GOOGLE_APPLICATION_CREDENTIALS=${HOME}/gcloud.json" >> $GITHUB_ENV
          
          echo "✅ Service account configured: ${SERVICE_EMAIL}"

      - name: Set Stripe runtime config (functions)
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          if [ -n "$STRIPE_SECRET_KEY" ] && [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            firebase functions:config:set stripe.secret="$STRIPE_SECRET_KEY" stripe.webhook="$STRIPE_WEBHOOK_SECRET" --project "$PROJECT_ID"
          else
            echo "Stripe secrets not provided; skipping functions:config:set"
          fi

      - name: Deploy Hosting
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase deploy --only hosting --project "$PROJECT_ID" --non-interactive

      - name: Deploy Functions
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          # Activate service account before deploying
          gcloud auth activate-service-account --key-file="${GOOGLE_APPLICATION_CREDENTIALS}" --quiet || true
          firebase deploy --only functions --project "$PROJECT_ID" --non-interactive
