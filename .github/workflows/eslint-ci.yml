name: eslint-ci

on:
  push:
    paths:
      - "bulgarian-car-marketplace/**"
      - ".github/workflows/eslint-ci.yml"
  pull_request:
    paths:
      - "bulgarian-car-marketplace/**"
      - ".github/workflows/eslint-ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bulgarian-car-marketplace
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bulgarian-car-marketplace/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Run ESLint (blocking)
        run: npx eslint --ext .ts,.tsx src
