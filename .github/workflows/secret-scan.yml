name: 🔐 Secret Scan

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛠️ Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install detect-secrets
        run: |
          pip install --upgrade pip
          pip install detect-secrets[gibberish]

      - name: 🔍 Scan for secrets (baseline)
        id: scan
        continue-on-error: true
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          detect-secrets scan --all-files --force-use-all-plugins \
            --exclude-lines 'REPLACE_ME|TEMPLATE|example|fake' \
            > .secrets.json.tmp || true
          
          # Check if baseline exists
          if [ -f .secrets.baseline ]; then
            echo "📊 Using existing baseline..."
            detect-secrets audit .secrets.baseline
          fi
          
          if [ -s .secrets.json.tmp ]; then
            echo "⚠️ Potential secrets found:"
            cat .secrets.json.tmp
            exit 1
          fi

      - name: 🔎 Pattern matching for common keys
        run: |
          echo "🔎 Searching for common API key patterns..."
          FAILED=0
          
          # Google API Keys
          if grep -r "AIzaSy" . --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
             --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=build \
             --exclude="*.example" --exclude=".env.example" 2>/dev/null; then
            echo "❌ Found hardcoded Google API keys!"
            FAILED=1
          fi
          
          # Algolia keys
          if grep -r "ALGOLIA.*=" . --include="*.ts" --include="*.js" \
             --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=build \
             --exclude="*.example" 2>/dev/null | grep -v "process.env" | grep -v "import.meta.env"; then
            echo "❌ Found hardcoded Algolia keys!"
            FAILED=1
          fi
          
          # Firebase keys not in env
          if grep -r "firebaseApp.*=.*{" . --include="*.ts" --include="*.js" \
             --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=build \
             --exclude="*.example" 2>/dev/null | grep -E "apiKey.*:.*\"[A-Za-z0-9]+\""; then
            echo "❌ Found hardcoded Firebase keys!"
            FAILED=1
          fi
          
          # Password strings
          if grep -r "password.*=.*['\"]" . --include="*.ts" --include="*.js" \
             --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=build \
             --exclude="*.md" --exclude="*.example" 2>/dev/null | \
             grep -v "// " | grep -v "TODO" | grep -v "REPLACE_ME"; then
            echo "❌ Found hardcoded passwords!"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "❌ Secret scan FAILED - Commit contains hardcoded secrets!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: 📋 Report results
        if: always()
        run: |
          echo "## 🔐 Secret Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ ${{ steps.scan.outcome }} == 'success' ]; then
            echo "✅ No secrets detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Secrets found! Please review the scan output above." >> $GITHUB_STEP_SUMMARY
          fi

  lint-env-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Verify .gitignore protections
        run: |
          echo "Checking .gitignore coverage..."
          
          # Check if sensitive files are in .gitignore
          MISSING=0
          
          for FILE in ".env" ".env.local" ".env.production" "google-services.json" "GoogleService-Info.plist" "secrets.json"; do
            if ! grep -q "^$FILE" .gitignore 2>/dev/null && ! grep -q "^\*/$FILE" .gitignore 2>/dev/null; then
              echo "⚠️ $FILE not in .gitignore"
              MISSING=1
            fi
          done
          
          if [ $MISSING -eq 1 ]; then
            echo ""
            echo "❌ .gitignore is incomplete!"
            exit 1
          else
            echo "✅ .gitignore has proper protections"
          fi

      - name: ✅ Verify .env.example exists
        run: |
          if [ ! -f web/.env.example ]; then
            echo "❌ web/.env.example is missing"
            exit 1
          else
            echo "✅ web/.env.example found"
          fi
          
          # Check no real secrets in .env.example
          if grep -i "AIzaSy\|47f00\|885688\|sk_test\|pk_test" web/.env.example; then
            echo "❌ .env.example contains real secrets!"
            exit 1
          else
            echo "✅ .env.example has no real secrets"
          fi
