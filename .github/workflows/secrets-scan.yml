name: secrets-scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.81.8
        with:
          path: .
          # Use regex + entropy detectors; skip node_modules and build folders
          extra_args: >-
            --entropy
            --regex
            --exclude_paths node_modules,build,dist,DDD
            --fail
