name: secrets-scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Filesystem Scan
        run: |
          docker run --rm \
            -v "$PWD:/workdir" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /workdir \
            --only-verified \
            --no-update \
            --exclude-paths=/workdir/node_modules,/workdir/build,/workdir/dist,/workdir/DDD \
            --json > trufflehog-results.json || true
          
          # Check if any secrets were found
          if [ -s trufflehog-results.json ]; then
            echo "⚠️ Secrets detected! See results below:"
            cat trufflehog-results.json
            exit 1
          else
            echo "✅ No secrets detected"
          fi
