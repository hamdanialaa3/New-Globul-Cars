<!DOCTYPE html>
<html>
<head>
    <title>Clear Firestore Cache</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .button {
            background: #005ca9;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .button:hover {
            background: #004a8a;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Clear Firestore Cache</h1>
    <p>This will clear all Firestore IndexedDB data and fix the "Unexpected state" error.</p>
    
    <button class="button" onclick="clearAllData()">Clear All Firestore Data</button>
    <button class="button" onclick="window.location.href='/'">Go to Homepage</button>
    
    <div id="status" class="status"></div>

    <script>
        async function clearAllData() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Clearing data...';
            statusDiv.className = 'status';
            
            try {
                // Clear IndexedDB
                const databases = await indexedDB.databases();
                
                for (const db of databases) {
                    if (db.name && db.name.includes('firestore')) {
                        await new Promise((resolve, reject) => {
                            const deleteRequest = indexedDB.deleteDatabase(db.name);
                            deleteRequest.onsuccess = () => resolve(true);
                            deleteRequest.onerror = () => reject(deleteRequest.error);
                        });
                        console.log(`Deleted database: ${db.name}`);
                    }
                }
                
                // Clear localStorage
                Object.keys(localStorage).forEach(key => {
                    if (key.includes('firestore') || key.includes('firebase')) {
                        localStorage.removeItem(key);
                    }
                });
                
                // Clear sessionStorage
                Object.keys(sessionStorage).forEach(key => {
                    if (key.includes('firestore') || key.includes('firebase')) {
                        sessionStorage.removeItem(key);
                    }
                });
                
                statusDiv.innerHTML = '✅ Success! All Firestore data cleared.<br>Click "Go to Homepage" to reload the app.';
                statusDiv.className = 'status success';
                
            } catch (error) {
                console.error('Error clearing data:', error);
                statusDiv.innerHTML = '❌ Error: ' + error.message + '<br>Try closing all browser tabs and reopening.';
                statusDiv.className = 'status error';
            }
        }
    </script>
</body>
</html>
