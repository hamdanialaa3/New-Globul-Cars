<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globul Cars - Architecture Diagram | الخارطة المعمارية</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            background: #667eea;
            color: white;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn.active {
            background: #764ba2;
        }

        #diagram {
            width: 100%;
            height: 800px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #fafafa;
            overflow: auto;
        }

        .node {
            cursor: pointer;
            transition: all 0.3s;
        }

        .node:hover {
            filter: brightness(1.1);
        }

        .node rect {
            fill: #fff;
            stroke: #667eea;
            stroke-width: 2;
            rx: 8;
        }

        .node.core rect { fill: #ff6b6b; stroke: #c92a2a; }
        .node.services rect { fill: #4ecdc4; stroke: #087f5b; }
        .node.ui rect { fill: #ffe66d; stroke: #f59f00; }
        .node.app rect { fill: #95e1d3; stroke: #20c997; }
        .node.auth rect { fill: #a8e6cf; stroke: #51cf66; }
        .node.cars rect { fill: #ffd3a5; stroke: #ff922b; }
        .node.profile rect { fill: #fd79a8; stroke: #e64980; }
        .node.admin rect { fill: #fdcb6e; stroke: #fdcb6e; }
        .node.social rect { fill: #74b9ff; stroke: #0984e3; }
        .node.messaging rect { fill: #a29bfe; stroke: #6c5ce7; }
        .node.payments rect { fill: #fd79a8; stroke: #e84393; }
        .node.iot rect { fill: #55efc4; stroke: #00b894; }

        .node text {
            font-size: 12px;
            font-weight: 600;
            fill: #333;
            pointer-events: none;
        }

        .link {
            stroke: #999;
            stroke-opacity: 0.6;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }

        .link:hover {
            stroke-opacity: 1;
            stroke-width: 3;
        }

        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 350px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .info-panel.show {
            display: block;
        }

        .info-panel h3 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .info-panel .detail {
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }

        .info-panel .detail strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏗️ Globul Cars Architecture Diagram</h1>
            <p>الخارطة المعمارية الكاملة للمشروع - Complete Project Architecture</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>11</h3>
                <p>Packages</p>
            </div>
            <div class="stat-card">
                <h3>823+</h3>
                <p>Files</p>
            </div>
            <div class="stat-card">
                <h3>100%</h3>
                <p>Migration Complete</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn active" onclick="showView('all')">عرض الكل | Show All</button>
            <button class="btn" onclick="showView('core')">Core Packages</button>
            <button class="btn" onclick="showView('features')">Features</button>
            <button class="btn" onclick="showView('dependencies')">Dependencies</button>
            <button class="btn" onclick="resetView()">إعادة تعيين | Reset</button>
        </div>

        <svg id="diagram"></svg>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #ff6b6b;"></div>
                <span>Core</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #4ecdc4;"></div>
                <span>Services</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffe66d;"></div>
                <span>UI</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #95e1d3;"></div>
                <span>App</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #a8e6cf;"></div>
                <span>Auth</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffd3a5;"></div>
                <span>Cars</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #fd79a8;"></div>
                <span>Profile</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #fdcb6e;"></div>
                <span>Admin</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #74b9ff;"></div>
                <span>Social</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #a29bfe;"></div>
                <span>Messaging</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #55efc4;"></div>
                <span>Payments & IoT</span>
            </div>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <h3 id="infoTitle">Package Details</h3>
        <div id="infoContent"></div>
    </div>

    <script>
        // Architecture Data
        const architecture = {
            nodes: [
                {
                    id: "core",
                    name: "Core",
                    type: "core",
                    description: "Core functionality and shared utilities",
                    details: {
                        "Hooks": "23 hooks",
                        "Utils": "34 utilities",
                        "Types": "20 type definitions",
                        "Contexts": "6 contexts",
                        "Constants": "Static data",
                        "Locales": "Translations (BG/EN)",
                        "Features": "Analytics, Reviews, Team, Verification"
                    },
                    dependencies: [],
                    dependents: ["services", "ui", "app", "auth", "cars", "profile", "admin", "social", "messaging", "payments", "iot"]
                },
                {
                    id: "services",
                    name: "Services",
                    type: "services",
                    description: "Business logic and API services",
                    details: {
                        "Firebase": "Firestore, Auth, Storage",
                        "Car Services": "CRUD, Search, Featured",
                        "User Services": "Profile, Auth, Verification",
                        "Messaging": "Real-time messaging",
                        "Analytics": "Tracking & Analytics",
                        "Payment": "Stripe integration",
                        "Social": "Social features",
                        "Admin": "Admin operations",
                        "Total": "216+ service files"
                    },
                    dependencies: ["core"],
                    dependents: ["app", "auth", "cars", "profile", "admin", "social", "messaging", "payments"]
                },
                {
                    id: "ui",
                    name: "UI Components",
                    type: "ui",
                    description: "Reusable UI components",
                    details: {
                        "Components": "388 component files",
                        "Layout": "Header, Footer, Layouts",
                        "Forms": "Input, Select, DatePicker",
                        "Car Components": "CarCard, CarSearch",
                        "Profile Components": "Profile, Dealer, Company",
                        "Admin Components": "Admin Dashboard",
                        "HomePage": "TrustStrip, LiveCounter, etc."
                    },
                    dependencies: ["core"],
                    dependents: ["app", "auth", "cars", "profile", "admin", "social"]
                },
                {
                    id: "app",
                    name: "App",
                    type: "app",
                    description: "Main application and routing",
                    details: {
                        "App.tsx": "Main app component",
                        "Routes": "All route definitions",
                        "Pages": "Home, About, Contact, Help",
                        "Sell Workflow": "Car selling pages",
                        "Legal": "Privacy, Terms, Data Deletion"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                },
                {
                    id: "auth",
                    name: "Auth",
                    type: "auth",
                    description: "Authentication pages",
                    details: {
                        "Login": "Glass morphism login",
                        "Register": "Registration flow",
                        "Email Verification": "Email verification",
                        "OAuth": "Social login callbacks",
                        "Admin Login": "Admin authentication"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                },
                {
                    id: "cars",
                    name: "Cars",
                    type: "cars",
                    description: "Car-related pages",
                    details: {
                        "CarsPage": "Car listings",
                        "CarDetailsPage": "Car details & edit",
                        "AdvancedSearch": "Advanced search",
                        "AllCarsPage": "Browse all cars",
                        "Hooks": "useCarSearch"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                },
                {
                    id: "profile",
                    name: "Profile",
                    type: "profile",
                    description: "User profile pages",
                    details: {
                        "ProfilePage": "Main profile page",
                        "Types": "Private, Dealer, Company",
                        "Tabs": "Overview, Ads, Campaigns, Analytics, Settings",
                        "Consultations": "Expert consultations"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                },
                {
                    id: "admin",
                    name: "Admin",
                    type: "admin",
                    description: "Admin dashboard and pages",
                    details: {
                        "AdminPage": "Main admin dashboard",
                        "User Management": "User operations",
                        "Content Management": "Content moderation",
                        "Analytics": "Admin analytics"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                },
                {
                    id: "social",
                    name: "Social",
                    type: "social",
                    description: "Social features",
                    details: {
                        "SocialFeedPage": "Main feed",
                        "AllPostsPage": "Browse posts",
                        "CreatePostPage": "Create posts",
                        "Events": "Events management"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                },
                {
                    id: "messaging",
                    name: "Messaging",
                    type: "messaging",
                    description: "Messaging system",
                    details: {
                        "MessagesPage": "Main messages page",
                        "Real-time": "WebSocket messaging",
                        "Notifications": "Push notifications"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                },
                {
                    id: "payments",
                    name: "Payments",
                    type: "payments",
                    description: "Payment and billing",
                    details: {
                        "BillingPage": "Subscription management",
                        "StripeCheckout": "Payment processing",
                        "SubscriptionPlans": "Plan selection",
                        "BillingService": "Billing operations"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                },
                {
                    id: "iot",
                    name: "IoT",
                    type: "iot",
                    description: "IoT dashboard",
                    details: {
                        "IoTDashboardPage": "IoT analytics",
                        "Car Tracking": "Vehicle tracking",
                        "Real-time Data": "Live data streams"
                    },
                    dependencies: ["core", "services", "ui"],
                    dependents: []
                }
            ]
        };

        // Initialize D3 diagram
        const width = 1600;
        const height = 800;
        const svg = d3.select("#diagram")
            .attr("width", width)
            .attr("height", height);

        // Add arrow marker
        svg.append("defs").append("marker")
            .attr("id", "arrowhead")
            .attr("refX", 6)
            .attr("refY", 3)
            .attr("markerWidth", 10)
            .attr("markerHeight", 10)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M 0,0 L 0,6 L 9,3 z")
            .attr("fill", "#999");

        // Create force simulation
        const simulation = d3.forceSimulation(architecture.nodes)
            .force("link", d3.forceLink().id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-500))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(80));

        // Create links
        const links = [];
        architecture.nodes.forEach(node => {
            node.dependencies.forEach(dep => {
                links.push({ source: dep, target: node.id });
            });
        });

        const link = svg.append("g")
            .selectAll("line")
            .data(links)
            .enter().append("line")
            .attr("class", "link");

        // Create nodes
        const node = svg.append("g")
            .selectAll("g")
            .data(architecture.nodes)
            .enter().append("g")
            .attr("class", d => `node ${d.type}`)
            .call(drag(simulation))
            .on("click", showInfo);

        node.append("rect")
            .attr("width", 120)
            .attr("height", 60)
            .attr("x", -60)
            .attr("y", -30);

        node.append("text")
            .text(d => d.name)
            .attr("text-anchor", "middle")
            .attr("dy", 5);

        // Update positions
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // Drag function
        function drag(simulation) {
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // Show info panel
        function showInfo(event, d) {
            const panel = document.getElementById("infoPanel");
            const title = document.getElementById("infoTitle");
            const content = document.getElementById("infoContent");

            title.textContent = `${d.name} Package`;
            content.innerHTML = `
                <div class="detail">
                    <strong>Description:</strong>
                    <p>${d.description}</p>
                </div>
                <div class="detail">
                    <strong>Details:</strong>
                    ${Object.entries(d.details).map(([key, value]) => 
                        `<p><strong>${key}:</strong> ${value}</p>`
                    ).join("")}
                </div>
                <div class="detail">
                    <strong>Dependencies:</strong>
                    <p>${d.dependencies.length > 0 ? d.dependencies.join(", ") : "None"}</p>
                </div>
                <div class="detail">
                    <strong>Used By:</strong>
                    <p>${d.dependents.length > 0 ? d.dependents.join(", ") : "None"}</p>
                </div>
            `;

            panel.classList.add("show");
        }

        // View controls
        function showView(type) {
            document.querySelectorAll(".btn").forEach(btn => btn.classList.remove("active"));
            event.target.classList.add("active");

            // Filter nodes based on view type
            const filteredNodes = architecture.nodes.filter(n => {
                if (type === "all") return true;
                if (type === "core") return ["core", "services", "ui"].includes(n.id);
                if (type === "features") return ["profile", "admin", "social", "messaging", "payments", "iot"].includes(n.id);
                if (type === "dependencies") return n.dependencies.length > 0;
                return true;
            });

            // Update simulation
            simulation.nodes(filteredNodes);
            simulation.alpha(1).restart();
        }

        function resetView() {
            simulation.alpha(1).restart();
            document.getElementById("infoPanel").classList.remove("show");
        }

        // Close info panel on outside click
        document.addEventListener("click", (e) => {
            const panel = document.getElementById("infoPanel");
            if (!panel.contains(e.target) && !e.target.closest(".node")) {
                panel.classList.remove("show");
            }
        });
    </script>
</body>
</html>
