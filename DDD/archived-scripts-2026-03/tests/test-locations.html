<!DOCTYPE html>
<html>
<head>
    <title>Test Bulgaria Locations Service</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Bulgaria Locations Test</h1>
    <div id="output"></div>

    <script type="module">
        // Simple test to verify the service works
        async function testService() {
            const output = document.getElementById('output');
            
            try {
                output.innerHTML += '<p>Fetching data...</p>';
                const response = await fetch('/data/bulgaria_locations_complete.md');
                output.innerHTML += `<p>Response status: ${response.status}</p>`;
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const text = await response.text();
                output.innerHTML += `<p>File loaded! Length: ${text.length} characters</p>`;
                
                // Count provinces
                const provinceMatches = text.match(/^## .+/gm);
                output.innerHTML += `<p>Found ${provinceMatches ? provinceMatches.length : 0} provinces</p>`;
                
                // Show first few provinces
                if (provinceMatches) {
                    output.innerHTML += '<h3>First 5 provinces:</h3><ul>';
                    provinceMatches.slice(0, 5).forEach(p => {
                        output.innerHTML += `<li>${p.replace('## ', '')}</li>`;
                    });
                    output.innerHTML += '</ul>';
                }
                
            } catch (error) {
                output.innerHTML += `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        testService();
    </script>
</body>
</html>
