name: Social Media Automation E2E Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_ENV: test
  # CI Secrets must be injected from GitHub Secrets
  CI_META_TOKEN: ${{ secrets.CI_META_TOKEN }}

jobs:
  # 1. Static Analysis & Unit Tests
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: |
          cd dev_s_media/services/publisher_service && npm ci
          cd ../worker && npm ci
      
      - name: Run Linters (Strict)
        run: |
          # Fails if any 'console.log' or 'any' type is found
          ./dev_s_media/scripts/preflight.sh --lint-only

      - name: Unit Tests
        run: |
          cd dev_s_media/services/worker
          npm test

  # 2. Integration Tests (Mocked External APIs)
  integration-test:
    needs: quality-check
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python (LLM Stub)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Run Mock LLM Server
        run: |
          # Starts a stub server responding with valid JSON schema
          python dev_s_media/tests/mocks/llm_stub.py &
          sleep 5

      - name: Run E2E Flow
        run: |
          # 1. Trigger Publisher Webhook
          curl -X POST http://localhost:3001/webhook \
            -d @dev_s_media/tests/fixtures/ad_valid.json
          
          # 2. Verify Database Record (Idempotency)
          # 3. Verify Queue Job
          # 4. Verify 'Published' status in Mock Meta Server
          npm run test:e2e
