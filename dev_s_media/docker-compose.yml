version: '3.8'

services:
  # 🗄️ Database for Social Media Meta-data
  postgres_media:
    image: postgres:15-alpine
    container_name: koli_media_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: koli_media_db
    volumes:
      - postgres_media_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d koli_media_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 📨 Queue System for Background Jobs
  redis_media:
    image: redis:alpine
    container_name: koli_media_queue
    ports:
      - "6379:6379"
    volumes:
      - redis_media_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_media_data:
  redis_media_data:
